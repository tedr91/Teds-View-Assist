# Shared Ted's Light Card config — for future use in views (e.g. a room/control view).
#
# Copy and set `entity` (required) plus optional `name` / `icon`. Vertical
# rocker with brightness memory via a helper; tweak per device.
type: custom:ted-light-card
entity: light.example
name: Light
theme: ted-style
orientation: vertical
show_indicator: true
indicator_color: light
brushed: false
shadow: true
rocker: true
rocker_effect: true
show_name: true
show_icon: true
show_state: true
memory_mode: helper
