# Shared Ted's Navbar Card — the single menu used on every view.
#
# Always snapped to the bottom of the screen (Status icon size / Menu
# configuration / Menu timeout options are intentionally ignored for now).
#
# Paste this whole block as the LAST card in every view so it pins to the
# bottom. Each item follows shared/label-button-navbar.yaml — icon-only, flat —
# and navigates within the View Assist dashboard (assumed mounted at
# /view-assist; adjust the paths if yours differs).
type: custom:ted-navbar-card
theme: ted-style
alignment: bottom
bar_type: snap
size: 56
sections:
  - placement: center
    align: center
    overflow: true
    items:
      - type: custom:ted-label-button-card
        theme: ted-style
        icon: mdi:home
        icon_scale: 140
        icon_color: none
        show_name: false
        show_state: false
        neumorphic: false
        brushed: false
        shadow: false
        transparency: 100
        tap_action: { action: view-assist-navigate, view: home }
