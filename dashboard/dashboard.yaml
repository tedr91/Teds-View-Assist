# Ted's View Assist — master dashboard
#
# The View Assist integration injects the per-device views from the views/
# folder at runtime. This master shell provides:
#   • the friendly browser / missing-resources banner (see dashboard/banner.yaml)
#   • a default Home view so the dashboard is coherent when opened in a browser
#   • the Ted-styled assist overlays (see dashboard/overlay.html + overlay.css)
#
# Assumes the dashboard is mounted at /view-assist (matches the navbar paths in
# shared/navbar.yaml). Adjust paths if yours differs.
title: Ted's View Assist
views:
  - title: Home
    path: home
    type: panel
    cards:
      - type: vertical-stack
        cards:
          # --- Browser / missing-resources banner (mirror of dashboard/banner.yaml) ---
          - type: custom:ted-messagebox-card
            theme: ted-style
            severity: info
            display: pinned
            pinned_side: top
            icon: mdi:hand-wave
            title: 👋 Welcome to Ted's View Assist
            message: >-
              These views are tuned for View Assist devices, so in a normal browser
              some things may look or behave differently. If anything appears missing,
              install the dependencies via HACS and refresh.
            docs_url: https://github.com/tedr91/Teds-View-Assist#installation
            docs_label: Setup guide
            dismiss_key: tva-welcome
            show_if:
              not_view_assist: true
              missing_cards:
                - ted-navbar-card
                - ted-clock-weather-card
                - ted-label-button-card
                - daylight-calendar-card
            actions:
              - { label: Go to Home, icon: mdi:home, action: view-assist-navigate, view: home, variant: primary }
              - { label: Dismiss, action: dismiss-session }
          # --- Default Home content (clock + weather) ---
          - type: custom:ted-clock-weather-card
            theme: ted-style
            show_clock: true
            clock_size: large
            show_date: true
            date_below_clock: true
            show_weather: true
            show_weather_icon: true
            show_current_temp: true
            weather_above_clock: true
            icon_style: fancy
      # --- Bottom navbar (see shared/navbar.yaml) ---
      - type: custom:ted-navbar-card
        theme: ted-style
        alignment: bottom
        bar_type: snap
        size: 56
        size_source: { va_device: true, attribute: status_icons_size }
        sections:
          - placement: left
            align: left
            items:
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:pin-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-hold }, visibility: [{ condition: not, conditions: [{ condition: view-assist, view: [clock, home-handheld, home-wallpanel, home-wallpanel-alt] }] }] }
          - placement: left
            align: left
            items: []
          - placement: center
            align: center
            overflow: true
            items:
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:home-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: home } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:calendar-ltr-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: calendar } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:weather-partly-cloudy-day-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: weather } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:temperature-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: thermostat } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:video-security-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: camera } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:music-note-2-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: music } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:image-multiple-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: photos } }
          - placement: right
            align: right
            items_source: { va_device: true, attribute: status_icons }
            items:
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:timer-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: timers } }
              - { type: custom:ted-label-button-card, theme: ted-style, icon: fluent:clock-alarm-24-regular, icon_scale: 125, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 99, tap_action: { action: view-assist-navigate, view: alarm } }
          - placement: right
            align: right
            items:
              - { type: time }
