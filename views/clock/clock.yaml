# Clock — View Assist's default home screen (matches the stock home_screen /view-assist/clock).
# At-a-glance time, date, weather; ideal for small landscape displays (Echo Show 5/8).
# A per-device tip can suggest a better-fit home layout. Bottom navbar (see shared/navbar.yaml).
#
# LAYOUT (prototype): custom:layout-card grid-layout frames the content with fixed-px gutters and
# paints this device's View Assist background behind everything. The background layer is a
# custom:button-card (already a View Assist dependency) that reads the device's VA sensor from
# localStorage and uses its `background` attribute — the same mechanism dinki's stock views use.
type: custom:layout-card
layout_type: custom:grid-layout
variables:
  clockcardversion: 999.0.0
layout:
  # Fill the viewport — in panel mode the layout otherwise collapses to content
  # height, which starves the 1fr content row and the full-bleed background.
  height: 100vh
  margin: "0"
  padding: "0"
  # Fixed-px frame around a single centered content cell — bump 24px to taste.
  # (Multi-block views can use a 5-col "Xpx 1fr Xpx 1fr Xpx" grid with content in cols 2 & 4.)
  grid-template-columns: 24px 1fr 24px
  grid-template-rows: 24px 1fr 24px
  grid-template-areas: |
    ". .       ."
    ". content ."
    ". .       ."
cards:
  # --- Per-device View Assist background (sits behind everything) ---
  - type: custom:button-card
    view_layout: { grid-column: 1 / -1, grid-row: 1 / -1 }
    show_icon: false
    show_name: false
    show_label: false
    show_state: false
    triggers_update: all
    styles:
      card:
        - background: >-
            [[[ try { var sensor = localStorage.getItem('view_assist_sensor'); var st = sensor ? hass.states[sensor] : null; var bg = st && st.attributes ? st.attributes.background : null; return bg ? ('center / cover no-repeat url(' + bg + ')') : 'transparent'; } catch (e) { return 'transparent'; } ]]]
        - background-size: cover
        - background-color: transparent
        - border: none
        - border-radius: "0"
        - box-shadow: none
        - height: 100%
        - width: 100%
        - min-height: 100%
  # Per-device suggestion tips — each shows only on its matching form factor and is
  # dismissible (Not now = this session; Never show again = persistent; both per device).
  # Small-landscape devices (Echo Show) match none, so the Clock view is left untouched.
  - type: custom:ted-messagebox-card
    view_layout: { grid-area: content }
    theme: ted-style
    severity: tip
    display: pinned
    pinned_side: top
    icon: mdi:cellphone
    title: A better layout is available
    message: You appear to be on a phone — the Home-Handheld view is a better fit.
    docs_url: https://github.com/tedr91/Teds-View-Assist#home-views
    dismiss_key: va-home-tip-handheld
    show_if: { form_factor: portrait-small }
    actions:
      - { label: Use Home-Handheld, icon: mdi:cellphone, action: view-assist-navigate, view: home-handheld, variant: primary }
      - { label: Not now, action: dismiss-session }
      - { label: Never show again, action: dismiss }
  - type: custom:ted-messagebox-card
    view_layout: { grid-area: content }
    theme: ted-style
    severity: tip
    display: pinned
    pinned_side: top
    icon: mdi:monitor
    title: A better layout is available
    message: This looks like a large landscape display — the Home-WallPanel view is a better fit.
    docs_url: https://github.com/tedr91/Teds-View-Assist#home-views
    dismiss_key: va-home-tip-wallpanel
    show_if: { form_factor: landscape-large }
    actions:
      - { label: Use Home-WallPanel, icon: mdi:monitor, action: view-assist-navigate, view: home-wallpanel, variant: primary }
      - { label: Not now, action: dismiss-session }
      - { label: Never show again, action: dismiss }
  - type: custom:ted-messagebox-card
    view_layout: { grid-area: content }
    theme: ted-style
    severity: tip
    display: pinned
    pinned_side: top
    icon: mdi:tablet
    title: A better layout is available
    message: This looks like a large portrait tablet — the Home-WallPanel (Portrait) view is a better fit.
    docs_url: https://github.com/tedr91/Teds-View-Assist#home-views
    dismiss_key: va-home-tip-wallpanel-alt
    show_if: { form_factor: portrait-large }
    actions:
      - { label: Use Home-WallPanel (Portrait), icon: mdi:tablet, action: view-assist-navigate, view: home-wallpanel-alt, variant: primary }
      - { label: Not now, action: dismiss-session }
      - { label: Never show again, action: dismiss }
  - type: custom:ted-clock-weather-card
    view_layout: { grid-area: content, place-self: center }
    theme: ted-style
    show_clock: true
    clock_size: large
    show_date: true
    date_below_clock: true
    show_weather: true
    show_weather_icon: true
    show_current_temp: true
    weather_above_clock: true
    icon_style: fancy
  - type: custom:ted-navbar-card
    view_layout: { grid-column: 1 / -1, grid-row: 3 / 4 }
    theme: ted-style
    alignment: bottom
    bar_type: snap
    size: 42
    size_source: { va_device: true, attribute: status_icons_size }
    sections:
      - placement: left
        align: left
        items:
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:pin-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-hold }, visibility: [{ condition: not, conditions: [{ condition: view-assist, view: [clock, home-handheld, home-wallpanel, home-wallpanel-alt] }] }] }
      - placement: left
        align: left
        items: []
      - placement: center
        align: center
        overflow: true
        items:
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:home-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: home } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:calendar-ltr-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: calendar } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:weather-partly-cloudy-day-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: weather } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:temperature-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: thermostat } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:video-security-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: camera } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:music-note-2-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: music } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:image-multiple-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: photos } }
      - placement: right
        align: right
        items_source: { va_device: true, attribute: status_icons }
        items:
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:timer-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: timers } }
          - { type: custom:ted-button-card, theme: ted-style, icon: fluent:clock-alarm-24-regular, icon_scale: 140, icon_color: none, show_name: false, show_state: false, neumorphic: false, brushed: false, shadow: false, transparency: 100, tap_action: { action: view-assist-navigate, view: alarm } }
      - placement: right
        align: right
        items:
          - { type: time }
